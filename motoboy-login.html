<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motoboy</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #000, #1a1a1a);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
}

.logo {
  text-align: center;
  font-size: 26px;
  margin-bottom: 15px;
}

.tabs {
  display: flex;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}

.tab.active {
  border-bottom: 2px solid #00ff88;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.btn {
  background: #00ff88;
  color: black;
}

.btn:hover {
  background: #00cc6a;
}

.hidden {
  display: none;
}

small {
  display: block;
  text-align: center;
  margin-top: 10px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">🛵 Motoboy</div>

  <div class="tabs">
    <div class="tab active" onclick="trocar('login')">Entrar</div>
    <div class="tab" onclick="trocar('cadastro')">Criar conta</div>
  </div>

  <!-- LOGIN -->
  <div id="loginBox">
    <input id="cpfLogin" placeholder="CPF">
    <input id="senhaLogin" type="password" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
  </div>

  <!-- CADASTRO -->
  <div id="cadastroBox" class="hidden">
    <input id="cpfCad" placeholder="CPF">
    <input id="nome" placeholder="Nome completo">
    <input id="telefone" placeholder="Telefone (DDD + número)">
    <input id="nascimento" type="date">
    <input id="senhaCad" type="password" placeholder="Senha">
    <button class="btn" onclick="cadastrar()">Criar conta</button>
  </div>

  <small>Use seu CPF como login</small>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔄 TROCAR ABA
window.trocar = (tipo) => {
  document.getElementById("loginBox").classList.toggle("hidden", tipo !== "login");
  document.getElementById("cadastroBox").classList.toggle("hidden", tipo !== "cadastro");

  const tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => t.classList.remove("active"));
  tabs[tipo === "login" ? 0 : 1].classList.add("active");
};

// 🆕 CADASTRO
window.cadastrar = async () => {

  let cpf = document.getElementById("cpfCad").value.replace(/\D/g, "");
  let telefone = document.getElementById("telefone").value.replace(/\D/g, "");

  const nome = document.getElementById("nome").value;
  const nascimento = document.getElementById("nascimento").value;
  const senha = document.getElementById("senhaCad").value;

  // validações
  if (cpf.length < 11) {
    alert("CPF inválido");
    return;
  }

  if (telefone.length < 10) {
    alert("Telefone inválido");
    return;
  }

  if (!nome) {
    alert("Preencha o nome");
    return;
  }

  if (!senha || senha.length < 6) {
    alert("Senha deve ter pelo menos 6 caracteres");
    return;
  }

  const emailFake = cpf + "@app.com";

  try {

    const user = await createUserWithEmailAndPassword(auth, emailFake, senha);

    await setDoc(doc(db, "motoboys", user.user.uid), {
      nome,
      cpf,
      nascimento,
      telefone,
      saldo: 0,
      online: true,
      location: {
        lat: 0,
        lng: 0
      },
      createdAt: serverTimestamp()
    });

    alert("✅ Conta criada! Faça login");

    trocar("login");

  } catch (e) {

    if (e.code === "auth/email-already-in-use") {
      alert("CPF já cadastrado");
    } else {
      alert("Erro: " + e.message);
    }

  }
};

// 🔐 LOGIN
window.login = async () => {

  let cpf = document.getElementById("cpfLogin").value.replace(/\D/g, "");
  const senha = document.getElementById("senhaLogin").value;

  if (cpf.length < 11) {
    alert("CPF inválido");
    return;
  }

  const emailFake = cpf + "@app.com";

  try {

    await signInWithEmailAndPassword(auth, emailFake, senha);

    window.location.href = "motoboy.html";

  } catch (e) {
    alert("Erro: " + e.message);
  }
};

</script>

</body>
</html>
