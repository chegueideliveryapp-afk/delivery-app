<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Motoboy LC</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #050505, #1a1a1a);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  padding: 26px;
  border-radius: 24px;
  width: 100%;
  max-width: 420px;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 20px 50px rgba(0,0,0,0.45);
}

.logo {
  text-align: center;
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 8px;
}

.subtitle {
  text-align: center;
  color: #aaa;
  font-size: 14px;
  margin-bottom: 22px;
}

.tabs {
  display: flex;
  background: #111;
  border-radius: 16px;
  padding: 5px;
  margin-bottom: 18px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px;
  cursor: pointer;
  border-radius: 12px;
  color: #aaa;
  font-weight: bold;
}

.tab.active {
  background: #00ff88;
  color: #000;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #333;
  outline: none;
  background: #101010;
  color: white;
  font-size: 15px;
}

input::placeholder {
  color: #777;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 14px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
}

.btn {
  background: #00ff88;
  color: black;
}

.btn:hover {
  background: #00cc6a;
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.hidden {
  display: none;
}

small {
  display: block;
  text-align: center;
  margin-top: 14px;
  color: #999;
}

.msg {
  margin-top: 12px;
  font-size: 14px;
  text-align: center;
}

.erro {
  color: #ff5c5c;
}

.sucesso {
  color: #00ff88;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">🛵 Motoboy</div>
  <div class="subtitle">Entre ou crie sua conta para receber corridas</div>

  <div class="tabs">
    <div class="tab active" onclick="trocar('login')">Entrar</div>
    <div class="tab" onclick="trocar('cadastro')">Criar conta</div>
  </div>

  <div id="loginBox">
    <input id="cpfLogin" placeholder="CPF">
    <input id="senhaLogin" type="password" placeholder="Senha">
    <button class="btn" id="btnLogin" onclick="login()">Entrar</button>
  </div>

  <div id="cadastroBox" class="hidden">
    <input id="cpfCad" placeholder="CPF">
    <input id="nome" placeholder="Nome completo">
    <input id="telefone" placeholder="Telefone com DDD">
    <input id="nascimento" type="date">
    <input id="senhaCad" type="password" placeholder="Senha mínimo 6 caracteres">
    <button class="btn" id="btnCadastro" onclick="cadastrar()">Criar conta</button>
  </div>

  <div id="msg" class="msg"></div>

  <small>Use seu CPF como login</small>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
  storageBucket: "chegueidelivery-90259.firebasestorage.app",
  messagingSenderId: "930909516939",
  appId: "1:930909516939:web:2f8258c80396c4cdf4d08e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function limparNumero(valor) {
  return valor.replace(/\D/g, "");
}

function mostrarMsg(texto, tipo = "erro") {
  const msg = document.getElementById("msg");
  msg.className = `msg ${tipo}`;
  msg.innerText = texto;
}

window.trocar = (tipo) => {
  document.getElementById("msg").innerText = "";

  document.getElementById("loginBox").classList.toggle("hidden", tipo !== "login");
  document.getElementById("cadastroBox").classList.toggle("hidden", tipo !== "cadastro");

  const tabs = document.querySelectorAll(".tab");
  tabs.forEach(t => t.classList.remove("active"));
  tabs[tipo === "login" ? 0 : 1].classList.add("active");
};

window.cadastrar = async () => {
  const btn = document.getElementById("btnCadastro");

  const cpf = limparNumero(document.getElementById("cpfCad").value);
  const telefone = limparNumero(document.getElementById("telefone").value);
  const nome = document.getElementById("nome").value.trim();
  const nascimento = document.getElementById("nascimento").value;
  const senha = document.getElementById("senhaCad").value;

  if (cpf.length !== 11) {
    mostrarMsg("CPF inválido.");
    return;
  }

  if (telefone.length < 10) {
    mostrarMsg("Telefone inválido.");
    return;
  }

  if (!nome) {
    mostrarMsg("Preencha o nome completo.");
    return;
  }

  if (!nascimento) {
    mostrarMsg("Informe sua data de nascimento.");
    return;
  }

  if (!senha || senha.length < 6) {
    mostrarMsg("Senha deve ter pelo menos 6 caracteres.");
    return;
  }

  const emailFake = `${cpf}@app.com`;

  btn.disabled = true;
  btn.innerText = "Criando conta...";

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, emailFake, senha);
    const uid = userCredential.user.uid;

    await setDoc(doc(db, "motoboys", uid), {
      nome,
      cpf,
      telefone,
      nascimento,
      email: emailFake,

      aprovado: false,
      bloqueado: false,
      statusCadastro: "pendente",

      online: false,

      lat: 0,
      lng: 0,

      location: {
        lat: 0,
        lng: 0
      },

      saldo: 0,
      totalRecebido: 0,

      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    });

    mostrarMsg("Conta criada! Aguarde aprovação do administrador.", "sucesso");

    document.getElementById("cpfCad").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("nascimento").value = "";
    document.getElementById("senhaCad").value = "";

    trocar("login");

  } catch (e) {
    if (e.code === "auth/email-already-in-use") {
      mostrarMsg("CPF já cadastrado.");
    } else {
      mostrarMsg("Erro ao criar conta: " + e.message);
    }
  }

  btn.disabled = false;
  btn.innerText = "Criar conta";
};

window.login = async () => {
  const btn = document.getElementById("btnLogin");

  const cpf = limparNumero(document.getElementById("cpfLogin").value);
  const senha = document.getElementById("senhaLogin").value;

  if (cpf.length !== 11) {
    mostrarMsg("CPF inválido.");
    return;
  }

  if (!senha) {
    mostrarMsg("Digite sua senha.");
    return;
  }

  const emailFake = `${cpf}@app.com`;

  btn.disabled = true;
  btn.innerText = "Entrando...";

  try {
    await signInWithEmailAndPassword(auth, emailFake, senha);
    window.location.href = "motoboy.html";
  } catch (e) {
    mostrarMsg("CPF ou senha inválidos.");
  }

  btn.disabled = false;
  btn.innerText = "Entrar";
};

</script>

</body>
</html>
