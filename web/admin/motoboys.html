<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Motoboys - Admin</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">

  <style>
    #mapaMotoboys {
      width: 100%;
      height: 460px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-top: 12px;
    }

    .motoboy-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }

    .badge {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #111;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.green {
      background: #dcfce7;
      color: #166534;
    }

    .badge.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.yellow {
      background: #fef3c7;
      color: #92400e;
    }

    .badge.gray {
      background: #e5e7eb;
      color: #374151;
    }

    .whatsapp-link {
      display: inline-block;
      margin-top: 8px;
      padding: 9px 10px;
      background: #128c7e;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .map-popup strong {
      display: block;
      margin-bottom: 6px;
    }

    .map-popup p {
      margin: 4px 0;
    }

    @media (max-width: 700px) {
      #mapaMotoboys {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Motoboys</h1>
    <a class="topbar-link" href="./dashboard.html">Voltar</a>
  </header>

  <main class="page">
    <section class="panel">
      <h2>Mapa dos motoboys</h2>
      <p class="hint">
        O mapa mostra motoboys que já possuem localização salva no app.
      </p>

      <div id="mapaMotoboys"></div>
    </section>

    <section class="panel">
      <h2>Motoboys cadastrados</h2>
      <p class="hint">
        Os motoboys aparecem aqui depois que criarem conta pelo app.
      </p>

      <div id="listaMotoboys"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { protegerPagina } from "../js/auth.js";
    import { carregarMotoboys } from "../js/admin.js";

    protegerPagina("admin");
    carregarMotoboys();
  </script>
</body>
</html>
