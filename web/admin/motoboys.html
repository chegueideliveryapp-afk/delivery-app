<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Motoboys - Admin</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <header class="topbar">
    <h1>Motoboys</h1>
    <a class="topbar-link" href="./dashboard.html">Voltar</a>
  </header>

  <main class="page">
    <section class="panel">
      <h2>Mapa dos motoboys</h2>
      <p class="hint">Motoboys com localização salva aparecem no mapa.</p>
      <div id="mapaMotoboys"></div>
    </section>

    <section class="panel">
      <h2>Motoboys cadastrados</h2>
      <p class="hint">Os motoboys aparecem aqui após criarem conta pelo app.</p>
      <div id="listaMotoboys"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script type="module">
    import { protegerPagina } from "../js/auth.js";
    import { carregarMotoboys } from "../js/admin.js";

    protegerPagina("admin");
    carregarMotoboys();
  </script>
</body>
</html>
