<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pedidos - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>

<body>
  <main class="admin-app">
    <header class="admin-header">
      <div>
        <span>Cheguei Admin</span>
        <h1>Pedidos</h1>
      </div>

      <a class="back-link" href="./dashboard.html">Voltar</a>
    </header>

    <section class="admin-card">
      <div class="section-head">
        <div>
          <span>Operação</span>
          <h2>Pedidos criados</h2>
        </div>

        <strong id="totalPedidos">0 pedidos</strong>
      </div>

      <div id="listaPedidosAdmin" class="admin-list">
        <div class="empty">Carregando pedidos...</div>
      </div>
    </section>
  </main>

  <script type="module">
    const lista = document.getElementById("listaPedidosAdmin");

    try {
      const authModule = await import("../js/auth.js?v=2");
      const pedidosModule = await import("../js/pedidos.js?v=2");

      if (!authModule.protegerAdmin) {
        throw new Error("A função protegerAdmin não foi encontrada em web/js/auth.js");
      }

      if (!pedidosModule.carregarPedidosAdmin) {
        throw new Error("A função carregarPedidosAdmin não foi encontrada em web/js/pedidos.js");
      }

      authModule.protegerAdmin();
      pedidosModule.carregarPedidosAdmin();
    } catch (erro) {
      console.error(erro);

      lista.innerHTML = `
        <div class="empty">
          Erro ao carregar a página de pedidos:<br>
          ${erro.message}
        </div>
      `;
    }
  </script>
</body>
</html>
