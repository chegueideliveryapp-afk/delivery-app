<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Novo Pedido - Cheguei Delivery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/restaurante.css">
</head>
<body>
  <main class="restaurant-app">
    <header class="restaurant-header">
      <div>
        <span>Cheguei Restaurantes</span>
        <h1>Novo Pedido</h1>
      </div>

      <a class="back-link" href="./dashboard.html">Voltar</a>
    </header>

    <section class="wallet-card">
      <span>Saldo pré-pago</span>
      <strong id="saldoPedido">R$ 0,00</strong>
      <p>O pedido só será criado se houver saldo suficiente para a taxa Cheguei.</p>
    </section>

    <section class="recharge-grid">
      <div class="info-card">
        <span>Dados da entrega</span>
        <strong>Pedido e destino</strong>

        <textarea id="pedidoCopiado" class="single-textarea large-textarea" placeholder="Cole aqui o pedido vindo do iFood, WhatsApp, Rappi, Zé Delivery ou outra plataforma"></textarea>

        <input id="enderecoEntrega" class="single-input" placeholder="Endereço de entrega">
        <button id="btnBuscarDistancia" class="secondary-btn">Buscar distância</button>

        <input id="distanciaEntregaKm" class="single-input" type="number" step="0.1" placeholder="Distância em km" readonly>

        <select id="formaPagamento" class="single-input">
          <option value="">Forma de pagamento</option>
          <option value="pix">Pix</option>
          <option value="cartao">Cartão</option>
          <option value="dinheiro">Dinheiro</option>
        </select>

        <label class="check-row">
          <input id="precisaRetorno" type="checkbox">
          Motoboy precisa retornar com maquininha ou troco
        </label>

        <input id="valorTroco" class="single-input hidden" type="number" step="0.01" placeholder="Troco para quanto?">

        <textarea id="observacaoPedido" class="single-textarea" placeholder="Observação opcional"></textarea>

        <button id="btnCalcularPedido" class="primary-btn">Calcular valores</button>
      </div>

      <div class="info-card">
        <span>Resumo financeiro</span>
        <strong id="valorTotalPedido">R$ 0,00</strong>

        <div class="price-lines">
          <p>Motoboy: <b id="valorMotoboyPedido">R$ 0,00</b></p>
          <p>Taxa retorno: <b id="taxaRetornoPedido">R$ 0,00</b></p>
          <p>Taxa Cheguei: <b id="taxaSistemaPedido">R$ 0,00</b></p>
          <p>Raio inicial: <b id="raioInicialPedido">3 km</b></p>
          <p>Distância: <b id="distanciaResumoPedido">---</b></p>
        </div>

        <button id="btnCriarPedido" class="primary-btn" disabled>Criar pedido</button>
        <div id="mensagem"></div>
      </div>
    </section>
  </main>

  <script type="module">
    import {
      protegerRestaurante,
      carregarNovoPedido,
      buscarDistanciaEntrega,
      calcularPedido,
      criarPedido
    } from "../js/restaurante.js";

    protegerRestaurante();
    carregarNovoPedido();

    document.getElementById("btnBuscarDistancia").addEventListener("click", buscarDistanciaEntrega);
    document.getElementById("enderecoEntrega").addEventListener("blur", buscarDistanciaEntrega);
    document.getElementById("btnCalcularPedido").addEventListener("click", calcularPedido);
    document.getElementById("btnCriarPedido").addEventListener("click", criarPedido);

    document.getElementById("precisaRetorno").addEventListener("change", (event) => {
      document.getElementById("valorTroco").classList.toggle("hidden", !event.target.checked);
    });
  </script>
</body>
</html>
