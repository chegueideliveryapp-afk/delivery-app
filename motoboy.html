<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motoboy2</title>

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; }

.header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.container { padding: 15px; }

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.aceitar { background: green; color: white; }
.recusar { background: red; color: white; }
.finalizar { background: blue; color: white; }

.popup {
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 999;
}

.popup-content {
  background:white;
  padding:25px;
  border-radius:12px;
  text-align: center;
  width: 90%;
  max-width: 300px;
}
</style>
</head>

<body>

<div class="header">
  🛵 Motoboy
  <div id="saldo">Saldo: R$ 0</div>
</div>

<div class="container" id="lista"></div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>🚨 Nova corrida</h2>
    <div id="info"></div>

    <button class="aceitar" onclick="aceitar()">Aceitar</button>
    <button class="recusar" onclick="recusar()">Recusar</button>
  </div>
</div>

<audio id="som" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let motoId = null;
let pedidoAtual = null;

// 🔐 VERIFICAR LOGIN
onAuthStateChanged(auth, (user) => {

  if (!user) {
    alert("Você precisa fazer login");
    window.location.href = "motoboy-login.html";
    return;
  }

  motoId = user.uid;

  iniciarApp();
});

// 🚀 INICIAR APP
function iniciarApp() {
  carregarSaldo();
  escutarPedidos();
}

// 💰 SALDO
async function carregarSaldo() {
  const snap = await getDoc(doc(db, "motoboys", motoId));
  const saldo = snap.data()?.saldo || 0;

  document.getElementById("saldo").innerText =
    "Saldo: R$ " + saldo;
}

// 🔄 PEDIDOS
function escutarPedidos() {

  onSnapshot(collection(db, "pedidos"), (snap) => {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    snap.forEach(docSnap => {
      const p = docSnap.data();

      if (
        p.status === "pendente" &&
        !(p.recusadoPor || []).includes(motoId)
      ) {
        mostrarPopup(docSnap.id, p);
      }

      if (p.status === "aceito" && p.motoboyId === motoId) {
        lista.innerHTML += `
          <div class="card">
            📍 ${p.enderecoEntrega}<br>
            💰 R$ ${p.valorMotoboy}
            <button class="finalizar" onclick="finalizar('${docSnap.id}', ${p.valorMotoboy})">
              Finalizar corrida
            </button>
          </div>
        `;
      }
    });
  });

}

// 🔔 POPUP
function mostrarPopup(id, p) {
  if (pedidoAtual === id) return;

  pedidoAtual = id;

  document.getElementById("popup").style.display = "flex";
  document.getElementById("info").innerHTML =
    `${p.enderecoEntrega}<br><b>R$ ${p.valorMotoboy}</b>`;

  document.getElementById("som").play();
}

// ✅ ACEITAR
window.aceitar = async () => {
  await updateDoc(doc(db, "pedidos", pedidoAtual), {
    status: "aceito",
    motoboyId: motoId,
    aceitoAt: new Date()
  });

  document.getElementById("popup").style.display = "none";
  pedidoAtual = null;
};

// ❌ RECUSAR
window.recusar = async () => {
  const ref = doc(db, "pedidos", pedidoAtual);

  const snap = await getDoc(ref);
  const recusados = snap.data().recusadoPor || [];

  await updateDoc(ref, {
    recusadoPor: [...recusados, motoId]
  });

  document.getElementById("popup").style.display = "none";
  pedidoAtual = null;
};

// 🏁 FINALIZAR
window.finalizar = async (id, valor) => {

  const pedidoRef = doc(db, "pedidos", id);
  const motoRef = doc(db, "motoboys", motoId);

  await updateDoc(pedidoRef, {
    status: "entregue",
    entregueAt: new Date()
  });

  const snap = await getDoc(motoRef);
  const saldoAtual = snap.data()?.saldo || 0;

  await updateDoc(motoRef, {
    saldo: saldoAtual + valor
  });

  alert("✅ Corrida finalizada!");

  carregarSaldo();

  setTimeout(() => location.reload(), 500);
};

</script>

</body>
</html>
