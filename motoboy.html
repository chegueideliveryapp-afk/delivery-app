<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motoboy</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

.header {
  background: black;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.aceitar { background: green; color: white; }
.finalizar { background: blue; color: white; }

.popup {
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.85);
  display:none;
  align-items:center;
  justify-content:center;
}

.popup-content {
  background:white;
  padding:20px;
  border-radius:10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="header">
  🛵 Motoboy
  <div id="saldo">Saldo: R$ 0</div>
</div>

<div class="container" id="lista"></div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>🚨 Nova corrida</h2>
    <div id="info"></div>
    <button class="aceitar" onclick="aceitar()">Aceitar</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const motoId = "moto1";

let pedidoAtual = null;

// 💰 CARREGAR SALDO
async function carregarSaldo() {
  try {
    const snap = await getDoc(doc(db, "motoboys", motoId));
    const saldo = snap.data()?.saldo || 0;

    document.getElementById("saldo").innerText =
      "Saldo: R$ " + saldo;
  } catch (e) {
    console.error(e);
  }
}
carregarSaldo();

// 🔄 ESCUTAR PEDIDOS
onSnapshot(collection(db, "pedidos"), (snap) => {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  snap.forEach(docSnap => {
    const p = docSnap.data();

    // 🔥 NOVO PEDIDO
    if (p.status === "pendente") {
      mostrarPopup(docSnap.id, p);
    }

    // 🛵 PEDIDO ACEITO
    if (p.status === "aceito" && p.motoboyId === motoId) {
      lista.innerHTML += `
        <div class="card">
          📍 ${p.enderecoEntrega}<br>
          💰 R$ ${p.valorMotoboy}
          <button class="finalizar" onclick="finalizar('${docSnap.id}', ${p.valorMotoboy})">
            Finalizar corrida
          </button>
        </div>
      `;
    }
  });
});

// 🔥 POPUP
function mostrarPopup(id, p) {
  if (pedidoAtual === id) return;

  pedidoAtual = id;

  document.getElementById("popup").style.display = "flex";
  document.getElementById("info").innerHTML =
    `${p.enderecoEntrega}<br><b>R$ ${p.valorMotoboy}</b>`;
}

// ✅ ACEITAR
window.aceitar = async () => {
  try {
    await updateDoc(doc(db, "pedidos", pedidoAtual), {
      status: "aceito",
      motoboyId: motoId,
      aceitoAt: new Date()
    });

    document.getElementById("popup").style.display = "none";
    pedidoAtual = null;

  } catch (e) {
    alert("Erro ao aceitar");
    console.error(e);
  }
};

// 🏁 FINALIZAR + SOMAR SALDO
window.finalizar = async (id, valor) => {
  try {

    const pedidoRef = doc(db, "pedidos", id);
    const motoRef = doc(db, "motoboys", motoId);

    // atualizar pedido
    await updateDoc(pedidoRef, {
      status: "entregue",
      entregueAt: new Date()
    });

    // pegar saldo atual
    const snap = await getDoc(motoRef);
    const saldoAtual = snap.data()?.saldo || 0;

    // atualizar saldo
    await updateDoc(motoRef, {
      saldo: saldoAtual + valor
    });

    alert("✅ Corrida finalizada!");

    carregarSaldo();

    // força atualizar lista
    setTimeout(() => location.reload(), 500);

  } catch (e) {
    console.error(e);
    alert("❌ Erro ao finalizar: " + e);
  }
};

</script>

</body>
</html>
