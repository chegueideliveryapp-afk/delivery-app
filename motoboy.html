<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motoboy</title>

<style>
body { font-family: Arial; margin: 0; background: #f2f2f2; }
.header { background: black; color: white; padding: 15px; text-align: center; }
.container { padding: 15px; }
.card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
.aceitar { background: green; color: white; }
.recusar { background: red; color: white; }
.finalizar { background: blue; color: white; }
.status-gps { font-size: 13px; margin-top: 6px; color: #b7ffb7; }

.popup {
  position: fixed;
  top:0;left:0;width:100%;height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index: 999;
}

.popup-content {
  background:white;
  padding:25px;
  border-radius:12px;
  text-align: center;
  width: 90%;
  max-width: 300px;
}
</style>
</head>

<body>

<div class="header">
  🛵 Motoboy
  <div id="saldo">Saldo: R$ 0</div>
  <div id="gpsStatus" class="status-gps">Aguardando GPS...</div>
</div>

<div class="container" id="lista"></div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>🚨 Nova corrida</h2>
    <div id="info"></div>

    <button class="aceitar" onclick="aceitar()">Aceitar</button>
    <button class="recusar" onclick="recusar()">Recusar</button>
  </div>
</div>

<audio id="som" src="https://www.soundjay.com/buttons/sounds/beep-01a.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  doc,
  updateDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let motoId = null;
let pedidoAtual = null;

let minhaLat = null;
let minhaLng = null;

const RAIO_KM = 5;

// 🔐 VERIFICAR LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Você precisa fazer login");
    window.location.href = "motoboy-login.html";
    return;
  }

  motoId = user.uid;
  iniciarApp();
});

// 🚀 INICIAR APP
function iniciarApp() {
  carregarSaldo();
  iniciarLocalizacaoTempoReal();
  escutarPedidos();
}

// 💰 SALDO
async function carregarSaldo() {
  const snap = await getDoc(doc(db, "motoboys", motoId));
  const saldo = snap.data()?.saldo || 0;

  document.getElementById("saldo").innerText = "Saldo: R$ " + saldo;
}

// 📍 LOCALIZAÇÃO EM TEMPO REAL
function iniciarLocalizacaoTempoReal() {
  if (!navigator.geolocation) {
    alert("Seu navegador não suporta localização.");
    return;
  }

  navigator.geolocation.watchPosition(
    async (pos) => {
      minhaLat = pos.coords.latitude;
      minhaLng = pos.coords.longitude;

      document.getElementById("gpsStatus").innerText =
        "📍 Online - GPS ativo";

      await updateDoc(doc(db, "motoboys", motoId), {
        online: true,
        location: {
          lat: minhaLat,
          lng: minhaLng
        },
        ultimaLocalizacaoAt: new Date()
      });

      console.log("Localização enviada:", minhaLat, minhaLng);
    },
    async (erro) => {
      console.error("Erro GPS:", erro);

      document.getElementById("gpsStatus").innerText =
        "❌ Permita localização para receber corridas";

      await updateDoc(doc(db, "motoboys", motoId), {
        online: false
      });
    },
    {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 10000
    }
  );
}

// 📏 CALCULAR DISTÂNCIA EM KM
function calcularDistanciaKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng / 2) * Math.sin(dLng / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// 🔄 PEDIDOS
function escutarPedidos() {
  onSnapshot(collection(db, "pedidos"), (snap) => {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    snap.forEach(docSnap => {
      const p = docSnap.data();

      // pedido pendente, não recusado e com localização
      if (
        p.status === "pendente" &&
        !(p.recusadoPor || []).includes(motoId)
      ) {
        let podeMostrar = true;
        let distanciaTexto = "";

        if (p.lat && p.lng && minhaLat && minhaLng) {
          const distancia = calcularDistanciaKm(minhaLat, minhaLng, p.lat, p.lng);

          distanciaTexto = `<br>📏 Distância: ${distancia.toFixed(2)} km`;

          if (distancia > RAIO_KM) {
            podeMostrar = false;
          }
        }

        if (podeMostrar) {
          mostrarPopup(docSnap.id, p, distanciaTexto);
        }
      }

      // pedido aceito pelo motoboy atual
      if (p.status === "aceito" && p.motoboyId === motoId) {
        lista.innerHTML += `
          <div class="card">
            📍 ${p.enderecoEntrega}<br>
            💰 R$ ${p.valorMotoboy}<br>
            <button class="finalizar" onclick="finalizar('${docSnap.id}', ${p.valorMotoboy})">
              Finalizar corrida
            </button>
          </div>
        `;
      }
    });
  });
}

// 🔔 POPUP
function mostrarPopup(id, p, distanciaTexto = "") {
  if (pedidoAtual === id) return;

  pedidoAtual = id;

  document.getElementById("popup").style.display = "flex";
  document.getElementById("info").innerHTML =
    `${p.enderecoEntrega}<br><b>R$ ${p.valorMotoboy}</b>${distanciaTexto}`;

  document.getElementById("som").play().catch(() => {});
}

// ✅ ACEITAR
window.aceitar = async () => {
  await updateDoc(doc(db, "pedidos", pedidoAtual), {
    status: "aceito",
    motoboyId: motoId,
    aceitoAt: new Date()
  });

  document.getElementById("popup").style.display = "none";
  pedidoAtual = null;
};

// ❌ RECUSAR
window.recusar = async () => {
  const ref = doc(db, "pedidos", pedidoAtual);

  const snap = await getDoc(ref);
  const recusados = snap.data().recusadoPor || [];

  await updateDoc(ref, {
    recusadoPor: [...recusados, motoId]
  });

  document.getElementById("popup").style.display = "none";
  pedidoAtual = null;
};

// 🏁 FINALIZAR
window.finalizar = async (id, valor) => {
  const pedidoRef = doc(db, "pedidos", id);
  const motoRef = doc(db, "motoboys", motoId);

  await updateDoc(pedidoRef, {
    status: "entregue",
    entregueAt: new Date()
  });

  const snap = await getDoc(motoRef);
  const saldoAtual = snap.data()?.saldo || 0;

  await updateDoc(motoRef, {
    saldo: saldoAtual + valor
  });

  alert("✅ Corrida finalizada!");

  carregarSaldo();

  setTimeout(() => location.reload(), 500);
};

</script>

</body>
</html>
