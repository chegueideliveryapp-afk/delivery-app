<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cheguei Motoboy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <main class="app-shell">
    <section class="auth-card">
      <div class="brand-block">
        <div class="app-mark">C</div>
        <div>
          <h1>Cheguei Motoboy</h1>
          <p>Corridas próximas, ganhos claros e controle na sua mão.</p>
        </div>
      </div>

      <div class="hero-panel">
        <div>
          <span class="hero-label">Área do entregador</span>
          <strong>Entre para ficar disponível</strong>
        </div>
        <div class="signal-dot"></div>
      </div>

      <div class="tabs">
        <button id="tabLogin" class="active">Entrar</button>
        <button id="tabCadastro">Criar conta</button>
      </div>

      <section id="loginBox" class="form-section">
        <label>CPF</label>
        <input id="cpfLogin" inputmode="numeric" autocomplete="username" placeholder="Digite seu CPF">

        <label>Senha</label>
        <input id="senhaLogin" type="password" autocomplete="current-password" placeholder="Digite sua senha">

        <button id="btnLogin" class="primary-btn">Entrar no app</button>
      </section>

      <section id="cadastroBox" class="form-section hidden">
        <label>CPF</label>
        <input id="cpfCadastro" inputmode="numeric" autocomplete="username" placeholder="Somente números">

        <label>Nome completo</label>
        <input id="nomeCadastro" autocomplete="name" placeholder="Seu nome completo">

        <label>Telefone</label>
        <input id="telefoneCadastro" inputmode="numeric" autocomplete="tel" placeholder="DDD + número">

        <label>Data de nascimento</label>
        <input id="nascimentoCadastro" type="date">

        <label>Senha</label>
        <input id="senhaCadastro" type="password" autocomplete="new-password" placeholder="Mínimo 6 caracteres">

        <button id="btnCadastro" class="primary-btn">Criar minha conta</button>
      </section>

      <div id="mensagem"></div>

      <div class="footer-note">
        Após o cadastro, sua conta precisa ser aprovada pela administração.
      </div>
    </section>
  </main>

  <script type="module" src="./src/auth.js"></script>
  <script type="module" src="./src/cadastro.js"></script>
</body>
</html>
