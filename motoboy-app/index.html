<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cheguei Motoboy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <main class="app-shell">
    <section class="card">
      <div class="brand">
        <h1>Cheguei Motoboy</h1>
        <p>Entre ou crie sua conta para receber corridas.</p>
      </div>

      <div class="tabs">
        <button id="tabLogin" class="active">Entrar</button>
        <button id="tabCadastro">Criar conta</button>
      </div>

      <section id="loginBox">
        <input id="cpfLogin" inputmode="numeric" placeholder="CPF">
        <input id="senhaLogin" type="password" placeholder="Senha">
        <button id="btnLogin" class="primary-btn">Entrar</button>
      </section>

      <section id="cadastroBox" class="hidden">
        <input id="cpfCadastro" inputmode="numeric" placeholder="CPF">
        <input id="nomeCadastro" placeholder="Nome completo">
        <input id="telefoneCadastro" inputmode="numeric" placeholder="Telefone com DDD">
        <input id="nascimentoCadastro" type="date">
        <input id="senhaCadastro" type="password" placeholder="Senha mínimo 6 caracteres">
        <button id="btnCadastro" class="primary-btn">Criar conta</button>
      </section>

      <div id="mensagem"></div>
    </section>
  </main>

  <script type="module" src="./src/auth.js"></script>
  <script type="module" src="./src/cadastro.js"></script>
</body>
</html>
