<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Restaurantes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #050505;
  color: white;
}

.header {
  padding: 22px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #0b0b0b;
  border-bottom: 1px solid #1f1f1f;
}

.container {
  padding: 20px;
  display: grid;
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #111;
  padding: 22px;
  border-radius: 22px;
  border: 1px solid #222;
  box-shadow: 0 15px 40px rgba(0,0,0,0.45);
}

h3 { margin-top: 0; font-size: 20px; }

input {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #333;
  outline: none;
  background: #181818;
  color: white;
  font-size: 15px;
}

input::placeholder { color: #777; }

button {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  background: #00ff88;
  color: black;
  border: none;
  border-radius: 16px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
}

button:disabled { opacity: 0.6; }

.status {
  font-size: 13px;
  margin-top: 10px;
  color: #999;
}

.sucesso { color: #00ff88; margin-top: 12px; }
.erro { color: #ff4d4d; margin-top: 12px; }

.grid {
  display: grid;
  gap: 14px;
}

#map {
  width: 100%;
  height: 380px;
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid #222;
  margin-bottom: 14px;
  background: #0b0b0b;
}

.leaflet-container {
  background: #111;
}

.motoboy-card {
  background: linear-gradient(135deg, #151515, #0c0c0c);
  border: 1px solid #252525;
  border-radius: 18px;
  padding: 16px;
  display: grid;
  gap: 10px;
}

.motoboy-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.badge-online {
  background: rgba(0,255,136,0.15);
  color: #00ff88;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}

.coord {
  font-size: 13px;
  color: #bbb;
}

.empty {
  color: #777;
  font-size: 14px;
  padding: 15px;
  background: #151515;
  border-radius: 14px;
}

.moto-marker {
  width: 42px;
  height: 42px;
  background: #00ff88;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 3px solid #fff;
  box-shadow: 0 8px 25px rgba(0,255,136,0.45);
}

.restaurante-marker {
  width: 42px;
  height: 42px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 3px solid #00ff88;
  box-shadow: 0 8px 25px rgba(255,255,255,0.35);
}
</style>
</head>

<body>

<div class="header" id="nomeRestaurante">Carregando...</div>

<div class="container">

  <div class="card">
    <h3>Novo Pedido</h3>

    <input id="endereco" placeholder="Endereço de entrega">
    <input id="valor" type="number" placeholder="Valor total">

    <button id="btn" onclick="criarPedido()">Enviar Pedido</button>

    <div class="status" id="gpsStatus">Obtendo localização do restaurante...</div>
    <div id="msg"></div>
  </div>

  <div class="card">
    <h3>Motoboys online</h3>

    <div id="map"></div>

    <div class="status" id="motoboyStatus">
      Buscando motoboys disponíveis...
    </div>

    <div class="grid" id="listaMotoboys"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const restauranteId = "rest1";

let lat = null;
let lng = null;

let map = null;
let restauranteMarker = null;
let motoboyMarkers = {};

const motoIcon = L.divIcon({
  html: `<div class="moto-marker">🏍️</div>`,
  className: "",
  iconSize: [42, 42],
  iconAnchor: [21, 21]
});

const restauranteIcon = L.divIcon({
  html: `<div class="restaurante-marker">🏪</div>`,
  className: "",
  iconSize: [42, 42],
  iconAnchor: [21, 21]
});

function iniciarMapa() {
  map = L.map("map", {
    zoomControl: true
  }).setView([-22.376, -46.942], 14);

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);
}

iniciarMapa();

async function carregarRestaurante() {
  const snap = await getDoc(doc(db, "restaurantes", restauranteId));

  document.getElementById("nomeRestaurante").innerText =
    snap.exists() ? snap.data().nome : "Restaurante";
}

carregarRestaurante();

function atualizarMarkerRestaurante() {
  if (!lat || !lng || !map) return;

  const pos = [lat, lng];

  if (!restauranteMarker) {
    restauranteMarker = L.marker(pos, { icon: restauranteIcon })
      .addTo(map)
      .bindPopup("Restaurante");
  } else {
    restauranteMarker.setLatLng(pos);
  }

  map.setView(pos, 14);
}

function iniciarGPS() {
  if (!navigator.geolocation) {
    document.getElementById("gpsStatus").innerText = "GPS não suportado";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      document.getElementById("gpsStatus").innerText =
        "📍 Localização do restaurante capturada";

      atualizarMarkerRestaurante();
    },
    () => {
      document.getElementById("gpsStatus").innerText =
        "⚠️ Usando localização padrão do restaurante";

      lat = -22.376;
      lng = -46.942;

      atualizarMarkerRestaurante();
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 30000
    }
  );
}

iniciarGPS();

function tempoRelativo(data) {
  if (!data) return "sem horário";

  const agora = new Date();
  const diff = Math.floor((agora - data) / 1000);

  if (diff < 60) return "agora mesmo";
  if (diff < 3600) return `${Math.floor(diff / 60)} min atrás`;
  return `${Math.floor(diff / 3600)} h atrás`;
}

function carregarMotoboysOnline() {
  const lista = document.getElementById("listaMotoboys");
  const status = document.getElementById("motoboyStatus");

  const q = query(
    collection(db, "motoboys"),
    where("online", "==", true)
  );

  onSnapshot(q, (snapshot) => {
    lista.innerHTML = "";

    Object.values(motoboyMarkers).forEach(marker => {
      map.removeLayer(marker);
    });

    motoboyMarkers = {};

    if (snapshot.empty) {
      status.innerText = "Nenhum motoboy online no momento.";
      lista.innerHTML = `<div class="empty">Aguardando motoboys ficarem online...</div>`;
      return;
    }

    status.innerText = `${snapshot.size} motoboy(s) online agora`;

    const bounds = [];

    if (lat && lng) {
      bounds.push([lat, lng]);
    }

    snapshot.forEach((docSnap) => {
      const m = docSnap.data();

      if (!m.lat || !m.lng) return;

      const motoLat = Number(m.lat);
      const motoLng = Number(m.lng);

      const pos = [motoLat, motoLng];

      bounds.push(pos);

      const marker = L.marker(pos, { icon: motoIcon })
        .addTo(map)
        .bindPopup("Motoboy online");

      motoboyMarkers[docSnap.id] = marker;

      let atualizadoEm = null;

      if (m.updatedAt?.toDate) {
        atualizadoEm = m.updatedAt.toDate();
      } else if (m.updatedAt) {
        atualizadoEm = new Date(m.updatedAt);
      }

      const div = document.createElement("div");
      div.className = "motoboy-card";

      div.innerHTML = `
        <div class="motoboy-top">
          <strong>Motoboy disponível</strong>
          <span class="badge-online">ONLINE</span>
        </div>

        <div class="coord">
          Latitude: ${motoLat.toFixed(5)}<br>
          Longitude: ${motoLng.toFixed(5)}
        </div>

        <div class="status">
          Última atualização: ${tempoRelativo(atualizadoEm)}
        </div>
      `;

      lista.appendChild(div);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, {
        padding: [40, 40],
        maxZoom: 15
      });
    }
  });
}

carregarMotoboysOnline();

window.criarPedido = async () => {
  const btn = document.getElementById("btn");
  const endereco = document.getElementById("endereco").value.trim();
  const valor = Number(document.getElementById("valor").value);
  const msg = document.getElementById("msg");

  msg.innerHTML = "";

  if (!endereco || !valor) {
    msg.innerHTML = "<div class='erro'>Preencha tudo</div>";
    return;
  }

  if (!lat || !lng) {
    msg.innerHTML = "<div class='erro'>Aguardando localização...</div>";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Enviando...";

  try {
    await addDoc(collection(db, "pedidos"), {
      enderecoEntrega: endereco,
      valorTotal: valor,
      valorMotoboy: 10,
      taxaSistema: 5,
      status: "pendente",
      motoboyId: "",
      restauranteId: restauranteId,
      recusadoPor: [],
      restauranteLat: lat,
      restauranteLng: lng,
      createdAt: new Date()
    });

    msg.innerHTML = "<div class='sucesso'>Pedido enviado!</div>";

    document.getElementById("endereco").value = "";
    document.getElementById("valor").value = "";

  } catch (e) {
    msg.innerHTML = "<div class='erro'>Erro ao enviar</div>";
    console.error(e);
  }

  btn.disabled = false;
  btn.innerText = "Enviar Pedido";
};

</script>

</body>
</html>
