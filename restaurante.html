<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Restaurante</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f2f2f2;
}

.header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  background: black;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}

.sucesso { color: green; }
.erro { color: red; }
</style>
</head>

<body>

<div class="header">
  <h2 id="nomeRestaurante">Carregando...</h2>
</div>

<div class="container">

  <div class="card">
    <h3>Novo Pedido</h3>

    <input id="endereco" placeholder="Endereço de entrega">
    <input id="valor" type="number" placeholder="Valor total">

    <button onclick="criarPedido()">Enviar Pedido</button>

    <div id="msg"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBwgR-CXLl676ga05qFfuuGQZyJEx6KwGQ",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259",
  storageBucket: "chegueidelivery-90259.firebasestorage.app",
  messagingSenderId: "930909516939",
  appId: "1:930909516939:web:2f8258c80396c4cdf4d08e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👉 DEFINE QUAL RESTAURANTE (simples por enquanto)
const restauranteId = "rest1";

// 🔄 CARREGAR NOME
async function carregarRestaurante() {
  const ref = doc(db, "restaurantes", restauranteId);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    document.getElementById("nomeRestaurante").innerText = snap.data().nome;
  } else {
    document.getElementById("nomeRestaurante").innerText = "Restaurante";
  }
}

carregarRestaurante();

// 🚀 CRIAR PEDIDO
window.criarPedido = async () => {
  const endereco = document.getElementById("endereco").value;
  const valor = Number(document.getElementById("valor").value);
  const msg = document.getElementById("msg");

  msg.innerHTML = "";

  if (!endereco || !valor) {
    msg.innerHTML = "<div class='erro'>Preencha tudo</div>";
    return;
  }

  try {

    await addDoc(collection(db, "pedidos"), {
      enderecoEntrega: endereco,
      valorTotal: valor,
      valorMotoboy: 10,
      taxaSistema: 5,
      status: "pendente",
      motoboyId: "",
      restauranteId: restauranteId,
      recusadoPor: [],
      lat: -22.376,
      lng: -46.942,
      createdAt: new Date()
    });

    msg.innerHTML = "<div class='sucesso'>Pedido enviado!</div>";

  } catch (e) {
    msg.innerHTML = "<div class='erro'>Erro ao enviar</div>";
    console.error(e);
  }
};

</script>

</body>
</html>
