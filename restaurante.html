<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Restaurantes</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #050505;
  color: white;
}

.header {
  padding: 22px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  background: #0b0b0b;
  border-bottom: 1px solid #1f1f1f;
}

.container {
  padding: 20px;
  display: grid;
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #111;
  padding: 22px;
  border-radius: 22px;
  border: 1px solid #222;
  box-shadow: 0 15px 40px rgba(0,0,0,0.45);
}

h3 { margin-top: 0; font-size: 20px; }

input {
  width: 100%;
  padding: 15px;
  margin-top: 12px;
  border-radius: 14px;
  border: 1px solid #333;
  outline: none;
  background: #181818;
  color: white;
}

button {
  width: 100%;
  padding: 16px;
  margin-top: 16px;
  background: #00ff88;
  color: black;
  border: none;
  border-radius: 16px;
  font-weight: bold;
}

.status { font-size: 13px; margin-top: 10px; color: #999; }
.sucesso { color: #00ff88; margin-top: 12px; }
.erro { color: #ff4d4d; margin-top: 12px; }

#map {
  width: 100%;
  height: 380px;
  border-radius: 22px;
  border: 1px solid #222;
  margin-bottom: 14px;
}

.moto-marker {
  width: 42px;
  height: 42px;
  background: #00ff88;
  color: #000;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  border: 3px solid #fff;
}
</style>
</head>

<body>

<div class="header" id="nomeRestaurante">Carregando...</div>

<div class="container">

  <div class="card">
    <h3>Novo Pedido</h3>

    <input id="endereco" placeholder="Endereço de entrega">
    <input id="valor" type="number" placeholder="Valor total">

    <button onclick="criarPedido()">Enviar Pedido</button>

    <div class="status" id="gpsStatus">Obtendo localização...</div>
    <div id="msg"></div>
  </div>

  <div class="card">
    <h3>Motoboys online</h3>

    <div id="map"></div>

    <div class="status" id="motoboyStatus">
      Buscando motoboys...
    </div>

    <div id="listaMotoboys"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  addDoc,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "chegueidelivery-90259.firebaseapp.com",
  projectId: "chegueidelivery-90259"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const restauranteId = "rest1";

let lat = null;
let lng = null;
let map = null;
let motoboyMarkers = {};

const motoIcon = L.divIcon({
  html: `<div class="moto-marker">🏍️</div>`,
  className: "",
  iconSize: [42, 42],
  iconAnchor: [21, 21]
});

function iniciarMapa() {
  map = L.map("map").setView([-22.376, -46.942], 13);

  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);
}

iniciarMapa();

async function carregarRestaurante() {
  const snap = await getDoc(doc(db, "restaurantes", restauranteId));
  document.getElementById("nomeRestaurante").innerText =
    snap.exists() ? snap.data().nome : "Restaurante";
}
carregarRestaurante();

navigator.geolocation.getCurrentPosition(
  (pos) => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    document.getElementById("gpsStatus").innerText = "Localização OK";
  },
  () => {
    lat = -22.376;
    lng = -46.942;
  }
);

function carregarMotoboysOnline() {
  const lista = document.getElementById("listaMotoboys");
  const status = document.getElementById("motoboyStatus");

  const q = query(collection(db, "motoboys"), where("online", "==", true));

  onSnapshot(q, (snapshot) => {
    lista.innerHTML = "";

    Object.values(motoboyMarkers).forEach(m => map.removeLayer(m));
    motoboyMarkers = {};

    if (snapshot.empty) {
      status.innerText = "Nenhum motoboy online";
      return;
    }

    const bounds = [];

    snapshot.forEach((docSnap) => {
      const m = docSnap.data();
      if (!m.lat || !m.lng) return;

      const pos = [m.lat, m.lng];
      bounds.push(pos);

      const marker = L.marker(pos, { icon: motoIcon })
        .addTo(map)
        .bindPopup("Motoboy disponível");

      motoboyMarkers[docSnap.id] = marker;

      lista.innerHTML += `
        <div class="status">
          📍 ${m.lat.toFixed(4)}, ${m.lng.toFixed(4)}
        </div>
      `;
    });

    if (bounds.length) {
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  });
}

carregarMotoboysOnline();

window.criarPedido = async () => {
  if (!lat || !lng) return;

  await addDoc(collection(db, "pedidos"), {
    restauranteId,
    lat,
    lng,
    status: "pendente",
    createdAt: new Date()
  });

  document.getElementById("msg").innerHTML = "<div class='sucesso'>Enviado</div>";
};

</script>

</body>
</html>
